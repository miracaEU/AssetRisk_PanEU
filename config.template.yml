# MIRACA pipeline configuration template.
# Copy this file to config.yml and fill in the paths for your machine.
# config.yml is gitignored and should never be committed.

exposure_dir: /path/to/exposure/files
output_dir: /path/to/output
river_hazard_dir: /path/to/hazard/river
wind_hazard_dir: /path/to/hazard/wind
